# CTD/C51-RNN on Craftax with weighted CF loss (same projected Bellman target as C51 CE).
# Differs from ``ctd_rnn_craftax.yaml`` only in ``DIST_LOSS`` and ω-sampling knobs.

ALG_NAME: "ctd_rnn"
ALG_VARIANT: "ctd"
WANDB_MODE: online
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 1024
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4
NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True

NUM_ATOMS: 51
V_MIN: 0.0
V_MAX: 200.0

# ``cross_entropy`` | ``weighted_cf`` (aliases: ce, weighted-cf)
DIST_LOSS: weighted_cf
NUM_OMEGA_SAMPLES: 32
OMEGA_MAX: 1.0
# Historical name: weight MSE by 1/ω² at sampled frequencies ω (not MoG σ).
IS_DIVIDED_BY_SIGMA_SQUARED: True

AUX_MEAN_LOSS_WEIGHT: 1.0
LR: 0.0003
MAX_GRAD_NORM: 0.5
LR_LINEAR_DECAY: True
REW_SCALE: 1.
GAMMA: 0.99
LAMBDA: 0.5

ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.00

WANDB_LOG_INTERVAL: 100
