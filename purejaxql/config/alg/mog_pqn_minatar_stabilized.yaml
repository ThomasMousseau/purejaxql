# MoG-PQN MinAtar (stabilized): Double DQN next-action + Polyak soft targets (TAU).
ALG_NAME: "mog_pqn_minatar_stabilized"
TOTAL_TIMESTEPS: 10000000
TOTAL_TIMESTEPS_DECAY: 10000000

NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.0
EPS_FINISH: 0.01
EXPLORATION_FRACTION: 0.3
LEARNING_STARTS: 10000

NUM_MINIBATCHES: 32
NUM_EPOCHS: 2

LR: 0.00025
LR_LINEAR_DECAY: True
MAX_GRAD_NORM: 10.0
ADAM_EPS_BATCH_REF: null

NORM_TYPE: "justnorm"
NORM_INPUT: False
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128

# MoG–CF + soft target
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
NUM_COMPONENTS: 8
TAU: 0.005

REW_SCALE: 1.0
GAMMA: 0.99

ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.0

PRINT_NETWORK_SUMMARY: False
WANDB_LOG_INTERVAL: 128

# Optional W&B filters (set via CLI or Slurm): EXPERIMENT_TAG, WANDB_EXTRA_TAGS, NAME
EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
