# MoG-PQN-RNN (stabilized) — Craftax: same rollout / memory / trunk defaults as ``mog_pqn_rnn_craftax``,
# plus **Double DQN + Polyak target** on the MoG–CF loss (see ``mog_pqn_rnn_stabilized_craftax.py``).

ALG_NAME: "mog_pqn_rnn_stabilized"
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9

NUM_ENVS: 1024
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.0
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4

NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True

LR: 0.0003
MAX_GRAD_NORM: 0.5
LR_LINEAR_DECAY: True
REW_SCALE: 1.0
GAMMA: 0.99

# MoG–CF + stabilizers (align TAU with ``mog_pqn_craftax``)
NUM_OMEGA_SAMPLES: 32
OMEGA_MAX: 1.0
NUM_COMPONENTS: 8
TAU: 0.005

ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0

WANDB_LOG_INTERVAL: 100
