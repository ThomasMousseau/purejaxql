# MoG-PQN (Mixture-of-Gaussians characteristic-function Q-learning) — Craftax.
# Mirrors hyper knobs from ``old_cvi/mog-pqn.py`` / ``cvi_dqn_nocollapse_jax.py`` where applicable.
ALG_NAME: "mog_pqn"
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9

NUM_ENVS: 1024
NUM_STEPS: 64
NUM_MINIBATCHES: 8
NUM_EPOCHS: 4

# Exploration (env-step linear epsilon; see mog_pqn_craftax.linear_epsilon)
EPS_START: 1.0
EPS_FINISH: 0.05
EXPLORATION_FRACTION: 0.5
LEARNING_STARTS: 10000  # random actions + no gradients until this many env steps (CleanRL CVI default)

# Optimizer: Adam eps = 0.01 / minibatch_size unless ADAM_EPS_BATCH_REF is set (CVI parity)
LR: 0.00025
LR_LINEAR_DECAY: False
MAX_GRAD_NORM: 10.0
ADAM_EPS_BATCH_REF: null  # e.g. 512 to match CVI --batch-size 512

# MoG–CF
NUM_OMEGA_SAMPLES: 32
OMEGA_MAX: 1.0
NUM_COMPONENTS: 8
TAU: 0.005  # Polyak target sync after each PQN update

# Trunk (Craftax-scale defaults; align with CVI Craftax: 256/256/128-style via HIDDEN_SIZE/NUM_LAYERS)
NORM_INPUT: False
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 4

REW_SCALE: 1.0
GAMMA: 0.99

# Env (same keys as pqn_craftax)
ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

WANDB_LOG_INTERVAL: 100
TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.0
