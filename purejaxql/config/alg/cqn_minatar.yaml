# characteristic-function variant for MinAtar
ALG_NAME: "cqn"
TOTAL_TIMESTEPS: 30000000
TOTAL_TIMESTEPS_DECAY: 30000000
NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.
EPS_FINISH: 0.05
EPS_DECAY: 0.1
NUM_MINIBATCHES: 32
NUM_EPOCHS: 2
NORM_TYPE: "justnorm"
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128
NUM_OMEGAS: 32
OMEGA_SAMPLER: "low_freq_mix"
OMEGA_SCALE: 1.0
OMEGA_CLIP: 8.0
OMEGA_BETA_ALPHA: 1.0
OMEGA_BETA_BETA: 3.0
OMEGA_UNIFORM_MIX_PROB: 0.25
SIGMA_MIN: 1e-6
AUX_MEAN_LOSS_WEIGHT: 0.1
LR: 0.0005
MAX_GRAD_NORM: 10
PER_LAYER_GRADIENT_CLIPPING: False
LR_LINEAR_DECAY: True
GAMMA: 0.99
N_STEP: 3

PRINT_NETWORK_SUMMARY: True
LOG_LAYER_GRAD_NORMS: False

# env specific
ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

# evaluation
TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.
