# Phi-TD MinAtar — mixture of Diracs (F_m): π and μ heads, CF Bellman only (no TD(λ) mean).
ALG_NAME: "phi_td_dirac"
FAMILY_DISTRIBUTION: "dirac"
TOTAL_TIMESTEPS: 30000000
TOTAL_TIMESTEPS_DECAY: 30000000

NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.
EPS_FINISH: 0.05
EPS_DECAY: 0.1

NUM_MINIBATCHES: 32
NUM_EPOCHS: 2

NORM_TYPE: "justnorm"
NORM_INPUT: False
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128

LR: 0.0005
MAX_GRAD_NORM: 10
PER_LAYER_GRADIENT_CLIPPING: False
LR_LINEAR_DECAY: True

# Shared atom count m (must match CTD/QTD/Phi categorical/quantile configs for comparisons)
NUM_ATOMS: 51

# CF loss (same weighting as MoG-PQN MinAtar)
IS_DIVIDED_BY_OMEGA_SQUARED: True
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
OMEGA_SAMPLING_DISTRIBUTION: "half_laplacian"

# Categorical projection unused for dirac; kept for Hydra compatibility if switching family in overrides
V_MIN: 0.0
V_MAX: 200.0

REW_SCALE: 1.0
GAMMA: 0.99

ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.0

PRINT_NETWORK_SUMMARY: False
LOG_LAYER_GRAD_NORMS: False
WANDB_LOG_INTERVAL: 128

EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
