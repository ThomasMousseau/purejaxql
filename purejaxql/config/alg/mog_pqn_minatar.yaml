# MoG-PQN MinAtar — match ``pqn_minatar.yaml`` training shell (ε schedule, RAdam, batch stats);
# differs only in MoG heads + CF loss (see ``mog_pqn_minatar.py``).
ALG_NAME: "mog_pqn_minatar"
TOTAL_TIMESTEPS: 10000000
TOTAL_TIMESTEPS_DECAY: 10000000

NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.
EPS_FINISH: 0.05
EPS_DECAY: 0.1

NUM_MINIBATCHES: 32
NUM_EPOCHS: 2

NORM_TYPE: "justnorm"
NORM_INPUT: False
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128

LR: 0.0005
MAX_GRAD_NORM: 10
PER_LAYER_GRADIENT_CLIPPING: False
LR_LINEAR_DECAY: True

# MoG–CF (one-step backup; same weight tape as PQN bootstrap)
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
NUM_COMPONENTS: 8

REW_SCALE: 1.0
GAMMA: 0.99

ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.0

PRINT_NETWORK_SUMMARY: False
LOG_LAYER_GRAD_NORMS: False
WANDB_LOG_INTERVAL: 128

EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
