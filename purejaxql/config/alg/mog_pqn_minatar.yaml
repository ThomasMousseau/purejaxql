# Canonical MoG MinAtar — match ``pqn_minatar.yaml`` shell (ε schedule, RAdam, batch stats);
# MoG heads + CF Bellman + TD(λ) on ``q_mog_mean`` (see ``mog_pqn_minatar.py``).
ALG_NAME: "mog_pqn"
TOTAL_TIMESTEPS: 30000000
TOTAL_TIMESTEPS_DECAY: 30000000

NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.
EPS_FINISH: 0.05
EPS_DECAY: 0.1

NUM_MINIBATCHES: 32
NUM_EPOCHS: 2

NORM_TYPE: "justnorm"
NORM_INPUT: False
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128

LR: 0.0005
MAX_GRAD_NORM: 10
PER_LAYER_GRADIENT_CLIPPING: False
LR_LINEAR_DECAY: True

# MoG–CF (one-step backup; same weight tape as PQN bootstrap)
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
OMEGA_SAMPLING_DISTRIBUTION: "half_laplacian"  # [half_laplacian, uniform, half_gaussian]
OMEGA_HALF_GAUSSIAN_MEAN: 0.0
OMEGA_HALF_GAUSSIAN_STD: 0.5
NUM_COMPONENTS: 8
AUX_MEAN_LOSS_WEIGHT: 1.0  # TD(λ) half-MSE weight vs CF loss

REW_SCALE: 1.0
GAMMA: 0.99
LAMBDA: 0.65  # same default as pqn_minatar.yaml (Q(λ) mixing)

ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.0

PRINT_NETWORK_SUMMARY: False
LOG_LAYER_GRAD_NORMS: False
WANDB_LOG_INTERVAL: 128

EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
