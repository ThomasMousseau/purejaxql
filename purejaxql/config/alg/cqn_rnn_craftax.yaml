# CQN-RNN — Craftax: same rollout / env / optimizer / trunk defaults as ``pqn_rnn_craftax.yaml``
# for fair comparison; loss is characteristic-function n-step (see ``cqn_rnn_craftax.py``).
ALG_NAME: "cqn_rnn"
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 1024 # 512
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4
NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True
LR: 0.0003
MAX_GRAD_NORM: 0.5
LR_LINEAR_DECAY: True
REW_SCALE: 1.
GAMMA: 0.99
LAMBDA: 0.5

# CQN heads (match ``cqn_minatar.yaml`` roles; MLP_HIDDEN_DIM matches LSTM width for no extra bottleneck)
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 512
NUM_OMEGAS: 24  # 32 OOMs on L40S with float32; use distributed script for more
OMEGA_SAMPLER: "low_freq_mix"
OMEGA_SCALE: 1.0
OMEGA_CLIP: 8.0
OMEGA_BETA_ALPHA: 1.0
OMEGA_BETA_BETA: 3.0
OMEGA_UNIFORM_MIX_PROB: 0.25
SIGMA_MIN: 1e-6
AUX_MEAN_LOSS_WEIGHT: 1.0
N_STEP: 3
USE_BF16: False

# env specific — match pqn_rnn_craftax
ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

# evaluation — match pqn_rnn_craftax
TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512 
TEST_NUM_STEPS: 10000
EPS_TEST: 0.00
