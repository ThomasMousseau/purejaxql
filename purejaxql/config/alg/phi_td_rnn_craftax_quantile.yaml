# Phi-TD RNN Craftax — quantile / F_{Q,m} (CF Bellman only; compare to ``qtd_rnn_craftax``).
# Trunk, rollout, memory window, optimizer match ``distributional_pqn_rnn_craftax`` (QTD).
ALG_NAME: "phi_td_quantile_rnn"
FAMILY_DISTRIBUTION: "quantile"

WANDB_MODE: online
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 1024
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4
NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True

# Quantile count m (same head width as ``qtd_rnn_craftax`` ``NUM_QUANTILES``).
M_PARTICLES: 51

IS_DIVIDED_BY_OMEGA_SQUARED: False
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
OMEGA_MIN: 0.01
OMEGA_SAMPLING_DISTRIBUTION: "pareto_1"

LR: 0.0003
MAX_GRAD_NORM: 0.5
PER_LAYER_GRADIENT_CLIPPING: False
LOG_LAYER_GRAD_NORMS: False
LR_LINEAR_DECAY: True
REW_SCALE: 1.
GAMMA: 0.99

ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.00

WANDB_LOG_INTERVAL: 100

EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
