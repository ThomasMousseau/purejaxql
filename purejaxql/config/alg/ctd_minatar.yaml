# CTD/C51 with the same CNN/PQN backbone and rollout shell as pqn_minatar.
ALG_NAME: "ctd"
ALG_VARIANT: "ctd"
TOTAL_TIMESTEPS: 30000000
TOTAL_TIMESTEPS_DECAY: 30000000
NUM_ENVS: 128
NUM_STEPS: 32
EPS_START: 1.
EPS_FINISH: 0.05
EPS_DECAY: 0.1
NUM_MINIBATCHES: 32
NUM_EPOCHS: 2
NORM_TYPE: "justnorm"
MLP_NUM_LAYERS: 1
MLP_HIDDEN_DIM: 128
NUM_ATOMS: 51
V_MIN: 0.0
V_MAX: 200.0
AUX_MEAN_LOSS_WEIGHT: 1.0
LR: 0.0005
MAX_GRAD_NORM: 10
PER_LAYER_GRADIENT_CLIPPING: False
LR_LINEAR_DECAY: True
GAMMA: 0.99
LAMBDA: 0.65

PRINT_NETWORK_SUMMARY: True
LOG_LAYER_GRAD_NORMS: True

ENV_NAME: "Asterix-MinAtar"
ENV_KWARGS: {}

TEST_DURING_TRAINING: True
TEST_INTERVAL: 0.05
TEST_NUM_ENVS: 128
EPS_TEST: 0.
