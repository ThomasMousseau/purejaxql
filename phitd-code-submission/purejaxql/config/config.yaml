# experiment params
NUM_SEEDS: 1
SEED: 0

# if  hyperparameters tuning
HYP_TUNE: False

# Weights & Biases — required when WANDB_MODE is "online"
# Replace ENTITY and PROJECT with your W&B username or team and project name.
# Placeholder values (e.g. your-entity / your-project) cause wandb.init to fail (404) at run start.
# Use WANDB_MODE: "disabled" for fully local runs without logging.
# Run `wandb login` once per machine when using online mode.
WANDB_MODE: "online"

ENTITY: "your-entity"
PROJECT: "your-project"

alg:
  WANDB_LOG_ALL_SEEDS: False # will log all the vmapped seeds separetely

# where to save the params (if None, will not save)
SAVE_PATH:

# optional .npz path for full training curves when WANDB_MODE is disabled (see save_train_metrics_npz)
METRICS_SAVE_PATH:
