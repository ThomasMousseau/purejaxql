# Phi-TD RNN Craftax — categorical / F_{C,m} (CF Bellman only; compare to ``ctd_rnn_craftax``).
# Trunk, rollout, memory window, optimizer match ``distributional_pqn_rnn_craftax`` (CTD).
ALG_NAME: "phi_td_categorical_rnn"
FAMILY_DISTRIBUTION: "categorical"

WANDB_MODE: disabled
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 1024
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4
NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True

# C51: m support particles on [V_MIN, V_MAX] (categorical / F_C only).
M_PARTICLES: 8
# Only used for ``FAMILY_DISTRIBUTION: categorical``.
V_MIN: 0.0
V_MAX: 200.0

# CF ω (same defaults as ``phi_td_minatar_categorical``; unweighted MSE).
IS_DIVIDED_BY_OMEGA_SQUARED: True
NUM_OMEGA_SAMPLES: 128
OMEGA_MAX: 1.0
OMEGA_MIN: 0.01
OMEGA_SAMPLING_DISTRIBUTION: "half_laplace"

LR: 0.0003
MAX_GRAD_NORM: 0.5
PER_LAYER_GRADIENT_CLIPPING: False
LOG_LAYER_GRAD_NORMS: False
LR_LINEAR_DECAY: True
REW_SCALE: 1.
GAMMA: 0.99

ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.00

WANDB_LOG_INTERVAL: 100

EXPERIMENT_TAG: null
WANDB_EXTRA_TAGS: null
