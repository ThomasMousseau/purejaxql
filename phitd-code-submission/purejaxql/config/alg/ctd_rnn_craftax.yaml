# CTD/C51-RNN — Craftax, aligned with pqn_rnn_craftax rollout/trunk/optimizer.
ALG_NAME: "ctd_rnn"
ALG_VARIANT: "ctd"
WANDB_MODE: online
TOTAL_TIMESTEPS: 1e9
TOTAL_TIMESTEPS_DECAY: 1e9
NUM_ENVS: 1024
MEMORY_WINDOW: 0
NUM_STEPS: 128
EPS_START: 1.
EPS_FINISH: 0.005
EPS_DECAY: 0.1
NUM_MINIBATCHES: 4
NUM_EPOCHS: 4
NORM_INPUT: True
NORM_TYPE: "layer_norm"
HIDDEN_SIZE: 512
NUM_LAYERS: 1
NUM_RNN_LAYERS: 1
ADD_LAST_ACTION: True

NUM_ATOMS: 8
V_MIN: 0.0
V_MAX: 200.0

AUX_MEAN_LOSS_WEIGHT: 0.0
LR: 0.0003
MAX_GRAD_NORM: 0.5
LR_LINEAR_DECAY: True
REW_SCALE: 1.
GAMMA: 0.99
LAMBDA: 0.0
IS_DIVIDED_BY_OMEGA_SQUARED: True
OMEGA_SAMPLING_DISTRIBUTION: "half_laplace"

ENV_NAME: "Craftax-Symbolic-v1"
USE_OPTIMISTIC_RESETS: True
OPTIMISTIC_RESET_RATIO: 16
LOG_ACHIEVEMENTS: False

TEST_DURING_TRAINING: False
TEST_INTERVAL: 0.01
TEST_NUM_ENVS: 512
TEST_NUM_STEPS: 10000
EPS_TEST: 0.00

WANDB_LOG_INTERVAL: 100
