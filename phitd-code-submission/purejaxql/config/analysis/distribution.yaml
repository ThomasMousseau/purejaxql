# Offline distribution-learning benchmark (CTD, QTD, φTD Dirac / categorical / quantile).
# Fields map 1:1 to DAConfig in run_distribution_analysis.py.
# CLI flags override YAML. Metrics are not stored here (they appear in plots).

seed: 0
num_seeds: 5
state_dim: 5
dataset_size: 500000
dataset_seed_offset: 1001
total_steps: 20000
log_every: 20000
# Parseval / Dirac anchor metrics (and JIT chunk size): must divide total_steps. Smaller => more CSV/plot points.
parseval_every: 1000
batch_size: 1024

num_atoms: 51
num_dirac_components: 51
num_tau: 51
# QTD and φTD Quant: same QTDNet(hidden_dim, trunk_layers, num_tau) when true (two networks, same arch — like CTD vs φ Cat).
phi_qt_same_arch_as_qtd: true
# Only when phi_qt_same_arch_as_qtd is false: φ Quant output dim (omit or null → use num_tau).
phi_qt_num_quantiles: null
# φTD Quant: blend in QTD's quantile-Huber loss so φ Quant tracks QTD (tune 0.1–1.0; 0 = CF-only).
phi_qt_aux_qtd_huber_weight: 0.0

num_omega: 32
gamma: 0.9
immediate_reward_std: 0.2
omega_max: 15.0
huber_kappa: 1.0
lr: 0.001
max_grad_norm: 10.0
omega_clip: 15.0
omega_laplace_scale: 0.8
cf_loss_omega_eps: 0.001
sigma_min: 0.000001
sigma_max: 20.0
# φTD only: 0 = pure CF loss (fair vs CTD cross-entropy / QTD quantile Huber with no extra mean term).
aux_mean_loss_weight: 0.0
c51_v_min: -25.0
c51_v_max: 25.0
embed_dim: 64
hidden_dim: 256
trunk_layers: 2
n_test: 10000
test_seed_offset: 7777
eval_chunk_size: 50
num_taus_iqn_eval: 2000
eval_iqn_seed: 42
eval_num_t: 201
eval_x_min: -15.0
eval_x_max: 15.0
eval_num_x: 301
risk_x_min: -200.0
risk_x_max: 200.0
risk_num_x: 2001
gp_t_delta: 0.0001
gp_num_t: 2001
cvar_alpha: 0.05
er_beta: 0.1
mv_lambda: 0.1

# φTD heads only: false → half-Laplacian ω + CF MSE / ω²; true → Pareto(α=1) on [omega_min_pareto, omega_clip] + plain CF MSE.
close_to_theory: true
omega_min_pareto: 0.001
